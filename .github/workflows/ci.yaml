name : CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

#compilation test , checks if image still builds , also check type error
jobs:
  build:
    name: Type-check & Docker image build
    runs-on: ubuntu-latest
    steps:
      - name : Checkout code
        uses : actions/checkout@v4

      - name : Setup Node.js
        uses : actions/setup-node@v4
        with : 
          node-version: '20'
          cache: 'npm'


      - name : Install dependencies
        run : npm ci

      - name : Generate Prisma client
        run : npx prisma generate

      - name : Type-check
        run : npx tsc --noEmit

      - name : Build Python runtime image
        run : docker build -t rce-python:latest -f docker/runtimes/python/Dockerfile .
