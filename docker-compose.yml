version: '3.8'
services:
   redis:
      image: redis:7-alpine
      container_name: rce-redis
      ports:
         - "6379:6379"
      restart: unless-stopped

   postgres:
      image: postgres:16-alpine
      container_name: rce-postgres
      environment:
         POSTGRES_USER: rce_user
         POSTGRES_PASSWORD: rce_password
         POSTGRES_DB: rce_db
      ports:
         - "5432:5432"
      volumes:
         - pgdata:/var/lib/postgresql/data
      restart: unless-stopped

volumes:
   pgdata: